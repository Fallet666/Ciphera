limit_req_zone $binary_remote_addr zone=matrix_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=matrix_api:20m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name api.potapovotrap.online ciphera.potapovotrap.online turn.potapovotrap.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.potapovotrap.online;

    ssl_certificate /etc/letsencrypt/live/api.potapovotrap.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.potapovotrap.online/privkey.pem;

    client_max_body_size 200M;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    server_tokens off;

    location ~ ^/_matrix/client/(r0|v3|unstable)/(login|register) {
        limit_req zone=matrix_login burst=10 nodelay;
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location ~ ^(/_matrix|/_synapse/client|/_synapse/admin) {
        limit_req zone=matrix_api burst=100 nodelay;
        limit_conn addr 30;

        proxy_pass http://127.0.0.1:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

server {
    listen 443 ssl http2;
    server_name ciphera.potapovotrap.online;

    ssl_certificate /etc/letsencrypt/live/api.potapovotrap.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.potapovotrap.online/privkey.pem;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
}
